<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · 紛失 · Jacob Vogan</title>
  <meta name="description" content="404 — page not found." />
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/png" sizes="64x64" href="media/favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="media/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F2EFE6;
      --paper: #FAF7EF;
      --ink: #111111;
      --ink-2: #3A3A38;
      --ink-3: #8A8A84;
      --red: #C22118;
      --hair: rgba(17, 17, 17, 0.14);
      --font-display: "Shippori Mincho B1", "Shippori Mincho", "Noto Serif JP", serif;
      --font-jp: "Noto Sans JP", "Shippori Mincho B1", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --font-body: "Inter Tight", ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--ink);
      box-shadow: 8px 8px 0 var(--ink);
      max-width: 720px;
      width: 100%;
      padding: 48px 56px 44px;
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px;
      width: 60px; height: 4px;
      background: var(--red);
    }

    /* Topbar mark */
    .mark {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-2);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .mark .rule {
      flex: 1;
      height: 1px;
      background: var(--hair);
    }
    .mark .dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: rec 1.6s ease-out infinite;
    }
    @keyframes rec {
      0%   { box-shadow: 0 0 0 0 rgba(194,33,24,0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(194,33,24,0); }
      100% { box-shadow: 0 0 0 0 rgba(194,33,24,0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .mark .dot { animation: none; }
    }

    /* The big 404 */
    .four {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(120px, 22vw, 220px);
      line-height: 0.9;
      letter-spacing: -0.04em;
      color: var(--ink);
      margin: 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .four .red { color: var(--red); }

    .lost-jp {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin: 18px 0 6px;
      padding-left: 2px;
    }
    .lost-jp .jp {
      font-family: var(--font-jp);
      letter-spacing: 0.32em;
      font-size: 14px;
      margin-right: 10px;
    }

    .latin {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 22px;
      color: var(--ink-2);
      margin: 14px 0 28px;
      max-width: 480px;
    }

    .body {
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink-2);
      max-width: 540px;
      margin: 0 0 28px;
    }
    .body code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--bg);
      padding: 2px 6px;
      border: 1px solid var(--hair);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border: 1px solid var(--ink);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      background: transparent;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease, color 140ms ease;
    }
    .btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--ink);
    }
    .btn.primary {
      background: var(--ink);
      color: #FAF7EF;
    }
    .btn.primary:hover {
      box-shadow: 4px 4px 0 var(--red);
    }
    .btn .arrow { font-family: var(--font-display); font-style: normal; }

    /* Footer log row */
    .log {
      margin-top: 36px;
      padding-top: 18px;
      border-top: 1px solid var(--hair);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    .log .red { color: var(--red); }

    /* Focus ring matches main site */
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--red);
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      .card { padding: 32px 28px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <article class="card">
      <div class="mark">
        <span class="dot" aria-hidden="true"></span>
        <span>Jacob Vogan</span>
        <span class="rule" aria-hidden="true"></span>
      </div>

      <h1 class="four"><span>4</span><span class="red">0</span><span>4</span></h1>

      <div class="lost-jp">Page not found</div>

      <p class="body">
        The page you were looking for isn’t here. It may have been moved or it may not exist yet.
      </p>

      <div class="actions">
        <a class="btn primary" href="/">
          <span>Home</span>
          <span class="arrow">→</span>
        </a>
        <a class="btn" href="https://github.com/jvogan" target="_blank" rel="noopener noreferrer">
          <span>github.com/jvogan</span>
          <span class="arrow">↗</span>
        </a>
      </div>

      <div class="log">
        <span>Error 404</span>
        <span>Jacob Vogan</span>
      </div>
    </article>
  </main>
</body>
</html>
